# FreeJobData — Next.js 16 on Netlify (OpenNext adapter, auto-detected).
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "npm --prefix netlify/functions install --omit=dev && node scripts/ensure-metrics-snapshot.js && node scripts/ensure-firebase-function-config.js && npm run build"
  publish = ".next"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."ingest-job-data-pool"]
  timeout = 26
  schedule = "@daily"

[build.environment]
  NODE_VERSION = "20"
  # Firebase project ID is public (also in client bundle); baked for function runtime.
  SECRETS_SCAN_OMIT_PATHS = "netlify/functions/_shared/firebase-runtime.json,netlify/functions/_shared/firebase-project-id.js"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_PROJECT_ID"

[context.production.environment]
  NEXT_PUBLIC_SITE_URL = "https://freejobdata.com"

[context.deploy-preview.environment]
  # NEXT_PUBLIC_SITE_URL omitted so lib/seo.ts uses Netlify's URL / DEPLOY_PRIME_URL.

[[redirects]]
  from = "/data/metrics-snapshot.json"
  to = "/.netlify/functions/ingest-job-data-pool?view=snapshot"
  status = 200

[[redirects]]
  from = "/data/metrics-manifest.json"
  to = "/.netlify/functions/ingest-job-data-pool?view=manifest"
  status = 200

[[redirects]]
  from = "/downloads/:dataset.csv"
  to = "/.netlify/functions/download-dataset?dataset=:dataset"
  status = 200

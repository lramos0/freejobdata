<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">U.S. active-duty reduction scenarios and payroll savings</title>
  <desc id="desc">Scenario chart showing estimated annual payroll savings from 5, 10, 15, and 20 percent active-duty personnel reductions.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="92" y="48" fill="#0f172a" font-family="Arial" font-size="30" font-weight="700">Figure 5. Reduction scenarios scale quickly, but savings are not automatic</text>
  <rect x="92" y="84" width="980" height="500" fill="#ffffff" stroke="#dbe3ef"/>
  <g stroke="#e5edf6" stroke-width="1">
    <line x1="92" y1="484" x2="1072" y2="484"/><line x1="92" y1="384" x2="1072" y2="384"/><line x1="92" y1="284" x2="1072" y2="284"/><line x1="92" y1="184" x2="1072" y2="184"/>
  </g>
  <g fill="#1c6ee8">
    <rect x="180" y="432" width="120" height="52"/><rect x="400" y="380" width="120" height="104"/><rect x="620" y="328" width="120" height="156"/><rect x="840" y="276" width="120" height="208"/>
  </g>
  <g font-family="Arial" font-size="18" fill="#0f172a" text-anchor="middle">
    <text x="240" y="522">5%</text><text x="460" y="522">10%</text><text x="680" y="522">15%</text><text x="900" y="522">20%</text>
    <text x="240" y="420">$5.8B</text><text x="460" y="368">$11.6B</text><text x="680" y="316">$17.4B</text><text x="900" y="264">$23.2B</text>
  </g>
  <g fill="#64748b" font-family="Arial" font-size="14">
    <text x="38" y="488">$0</text><text x="30" y="388">$10B</text><text x="30" y="288">$20B</text><text x="30" y="188">$30B</text>
  </g>
  <text x="92" y="660" fill="#475569" font-family="Arial" font-size="16">Scenario assumption: 1.3M active-duty baseline, $89K annual direct pay/allowance proxy per billet.</text>
  <text x="92" y="688" fill="#475569" font-family="Arial" font-size="16">Excludes transition, readiness, contractor substitution, veterans' obligations, and retraining costs.</text>
</svg>

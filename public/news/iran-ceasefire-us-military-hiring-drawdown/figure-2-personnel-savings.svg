<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Estimated cumulative personnel savings from post-Cold War reductions</title>
  <desc id="desc">Stacked area chart estimating cumulative inflation-adjusted savings from reduced active-duty personnel among selected European NATO countries.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="92" y="48" fill="#0f172a" font-family="Arial" font-size="30" font-weight="700">Figure 2. Personnel reductions create savings slowly, not instantly</text>
  <rect x="92" y="84" width="980" height="500" fill="#ffffff" stroke="#dbe3ef"/>
  <g stroke="#e5edf6" stroke-width="1">
    <line x1="92" y1="484" x2="1072" y2="484"/><line x1="92" y1="384" x2="1072" y2="384"/><line x1="92" y1="284" x2="1072" y2="284"/><line x1="92" y1="184" x2="1072" y2="184"/>
  </g>
  <path d="M92 560 L270 532 L448 500 L626 455 L804 420 L1072 390 L1072 560 Z" fill="#bfdbfe"/>
  <path d="M92 560 L270 545 L448 525 L626 490 L804 460 L1072 430 L1072 390 L804 420 L626 455 L448 500 L270 532 L92 560 Z" fill="#bbf7d0"/>
  <path d="M92 560 L270 552 L448 538 L626 510 L804 485 L1072 455 L1072 430 L804 460 L626 490 L448 525 L270 545 L92 560 Z" fill="#fde68a"/>
  <path d="M92 560 L270 556 L448 548 L626 530 L804 505 L1072 480 L1072 455 L804 485 L626 510 L448 538 L270 552 L92 560 Z" fill="#fecaca"/>
  <g fill="#64748b" font-family="Arial" font-size="14">
    <text x="48" y="488">$0</text><text x="38" y="388">$50B</text><text x="30" y="288">$100B</text><text x="30" y="188">$150B</text>
    <text x="86" y="614">1991</text><text x="314" y="614">2000</text><text x="542" y="614">2010</text><text x="770" y="614">2020</text><text x="1018" y="614">2025</text>
  </g>
  <g font-family="Arial" font-size="15" fill="#0f172a">
    <rect x="1090" y="130" width="18" height="14" fill="#bfdbfe"/><text x="1116" y="143">Payroll</text>
    <rect x="1090" y="160" width="18" height="14" fill="#bbf7d0"/><text x="1116" y="173">Housing/health</text>
    <rect x="1090" y="190" width="18" height="14" fill="#fde68a"/><text x="1116" y="203">Training</text>
    <rect x="1090" y="220" width="18" height="14" fill="#fecaca"/><text x="1116" y="233">Other support</text>
  </g>
  <text x="92" y="690" fill="#475569" font-family="Arial" font-size="16">Scenario estimate only. Assumes avoided personnel costs accumulate after reductions, offset by transition and readiness costs.</text>
</svg>

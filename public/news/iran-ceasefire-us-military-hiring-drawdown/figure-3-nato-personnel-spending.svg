<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">NATO active-duty personnel versus defense spending</title>
  <desc id="desc">Scatter plot comparing active-duty personnel and defense spending among NATO members, highlighting the United States as an outlier.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="92" y="48" fill="#0f172a" font-family="Arial" font-size="30" font-weight="700">Figure 3. The U.S. is the personnel and spending outlier</text>
  <rect x="92" y="84" width="980" height="500" fill="#ffffff" stroke="#dbe3ef"/>
  <g stroke="#e5edf6" stroke-width="1">
    <line x1="92" y1="484" x2="1072" y2="484"/><line x1="92" y1="384" x2="1072" y2="384"/><line x1="92" y1="284" x2="1072" y2="284"/><line x1="92" y1="184" x2="1072" y2="184"/>
    <line x1="250" y1="84" x2="250" y2="584"/><line x1="450" y1="84" x2="450" y2="584"/><line x1="650" y1="84" x2="650" y2="584"/><line x1="850" y1="84" x2="850" y2="584"/>
  </g>
  <g fill="#64748b" font-family="Arial" font-size="14">
    <text x="88" y="614">0</text><text x="426" y="614">200K</text><text x="626" y="614">400K</text><text x="826" y="614">600K</text><text x="982" y="614">1.3M+</text>
    <text x="34" y="488">$0</text><text x="26" y="388">$100B</text><text x="26" y="288">$200B</text><text x="26" y="188">$300B</text>
  </g>
  <g fill="#1c6ee8" opacity="0.8">
    <circle cx="140" cy="505" r="9"/><circle cx="185" cy="485" r="11"/><circle cx="215" cy="450" r="12"/><circle cx="260" cy="430" r="13"/>
    <circle cx="330" cy="390" r="15"/><circle cx="380" cy="360" r="15"/><circle cx="470" cy="318" r="17"/><circle cx="525" cy="302" r="18"/>
  </g>
  <circle cx="980" cy="140" r="28" fill="#dc2626"/>
  <text x="905" y="112" fill="#dc2626" font-family="Arial" font-size="22" font-weight="700">United States</text>
  <text x="92" y="660" fill="#475569" font-family="Arial" font-size="16">X-axis: active-duty personnel. Y-axis: defense spending. Bubble size: defense spending share of GDP.</text>
  <text x="92" y="688" fill="#475569" font-family="Arial" font-size="16">Source basis: NATO defence expenditure tables, public personnel data, and U.S. budget context.</text>
</svg>
